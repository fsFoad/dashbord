<div class="mb-5 flex flex-wrap items-center justify-between gap-3">
  <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0">{{ 'cal.title' | transloco }}</h1>
  <div class="flex items-center gap-1">
    <p-button [label]="'picker.today' | transloco" severity="secondary" [text]="true" size="small" (onClick)="goToday()" />
    <button type="button" (click)="addMonth(-1)" class="grid size-9 place-items-center rounded-lg text-muted-color hover:bg-surface-100 dark:hover:bg-surface-800">
      <i class="pi pi-angle-right rtl:rotate-0 ltr:rotate-180"></i>
    </button>
    <span class="min-w-32 text-center text-base font-semibold">{{ headerLabel() }}</span>
    <button type="button" (click)="addMonth(1)" class="grid size-9 place-items-center rounded-lg text-muted-color hover:bg-surface-100 dark:hover:bg-surface-800">
      <i class="pi pi-angle-left rtl:rotate-0 ltr:rotate-180"></i>
    </button>
  </div>
</div>

<div class="overflow-hidden rounded-2xl border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-900">
  <!-- weekday header -->
  <div class="grid grid-cols-7 border-b border-surface-200 dark:border-surface-800">
    @for (w of weekdays(); track $index) {
      <div class="py-2.5 text-center text-xs font-semibold text-muted-color">{{ w }}</div>
    }
  </div>

  <!-- day grid -->
  <div class="grid grid-cols-7">
    @for (cell of cells(); track $index) {
      @if (cell) {
        <button
          type="button"
          (click)="openCreate(cell)"
          class="group flex min-h-24 flex-col gap-1 border-b border-e border-surface-100 p-1.5 text-start transition-colors hover:bg-surface-50 dark:border-surface-800/60 dark:hover:bg-surface-800/40 sm:min-h-28"
        >
          <span
            class="grid size-6 place-items-center rounded-full text-xs font-semibold"
            [class.bg-primary]="cell.today"
            [class.text-primary-contrast]="cell.today"
            [class.text-muted-color]="!cell.today"
          >{{ dayLabel(cell.day) }}</span>

          @for (e of cell.events.slice(0, 3); track e.id) {
            <span
              role="button"
              (click)="openEdit(e, $event)"
              class="truncate-1 block w-full rounded px-1.5 py-0.5 text-[11px] font-medium"
              [class]="chipClass(e.color)"
            >{{ e.title }}</span>
          }
          @if (cell.events.length > 3) {
            <span class="px-1 text-[10px] text-muted-color">+{{ cell.events.length - 3 }}</span>
          }
        </button>
      } @else {
        <div class="min-h-24 border-b border-e border-surface-100 bg-surface-50/40 dark:border-surface-800/60 dark:bg-surface-800/20 sm:min-h-28"></div>
      }
    }
  </div>
</div>

<p class="mt-3 text-xs text-muted-color">{{ 'cal.hint' | transloco }}</p>

<!-- Event dialog -->
<p-dialog
  [visible]="dialogOpen()"
  (visibleChange)="dialogOpen.set($event)"
  [modal]="true"
  [draggable]="false"
  [style]="{ width: '24rem', maxWidth: '94vw' }"
  [header]="(editingId ? 'cal.editEvent' : 'cal.newEvent') | transloco"
>
  <div class="flex flex-col gap-4 pt-1">
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium">{{ 'cal.eventTitle' | transloco }}</label>
      <input pInputText [(ngModel)]="draft.title" />
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium">{{ 'cal.date' | transloco }}</label>
      <app-date-picker mode="date" [(ngModel)]="draft.date" />
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">{{ 'cal.color' | transloco }}</label>
      <div class="flex gap-2.5">
        @for (c of colors; track c) {
          <button
            type="button"
            (click)="draft.color = c"
            class="size-8 rounded-lg ring-2 ring-transparent transition"
            [class]="swatchClass(c)"
            [class.ring-surface-900]="draft.color === c"
            [class.dark:ring-surface-0]="draft.color === c"
          ></button>
        }
      </div>
    </div>
  </div>
  <ng-template #footer>
    @if (editingId) {
      <p-button [label]="'table.delete' | transloco" icon="pi pi-trash" severity="danger" [text]="true" size="small" (onClick)="remove()" />
      <span class="flex-1"></span>
    }
    <p-button [label]="'confirm.reject' | transloco" severity="secondary" [text]="true" size="small" (onClick)="dialogOpen.set(false)" />
    <p-button [label]="'profile.save' | transloco" icon="pi pi-check" size="small" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
