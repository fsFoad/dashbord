<!--<div class="flex h-dvh overflow-hidden bg-surface-50 dark:bg-surface-950">-->
<div
        class="flex h-dvh overflow-hidden bg-surface-50 dark:bg-surface-950 app-layout-root"
>
  <!-- Global API loading bar -->
  @if (loading.active()) {
    <div class="fixed inset-x-0 top-0 z-[1200] h-0.5 overflow-hidden">
      <div class="app-progress-bar h-full w-1/3 bg-primary"></div>
    </div>
  }

  <!-- Docked sidebar (desktop / static & slim modes) -->
  @if (!overlay()) {
    <app-sidebar class="shrink-0" />
  }

  <!-- Overlay drawer (mobile / overlay mode) -->
  @if (overlay()) {
    <p-drawer
      [visible]="layout.mobileDrawerOpen()"
      (visibleChange)="onDrawerVisible($event)"
      [position]="settings.isRtl() ? 'right' : 'left'"
      [closable]="false"
      [style]="{ width: 'var(--sidebar-width)', maxWidth: '85vw', padding: '0' }"
      styleClass="[&_.p-drawer-content]:p-0! [&_.p-drawer-header]:hidden"
    >
      <app-sidebar />
    </p-drawer>
  }

  <!-- Main column -->
  <div class="flex min-w-0 flex-1 flex-col">
    <app-topbar />
    <app-tab-bar />

      <main class="thin-scroll flex-1 overflow-y-auto app-content">
      <div class="mx-auto w-full max-w-[96rem] p-4 sm:p-6">
        <router-outlet />
      </div>
    </main>

    <app-footer />
  </div>

  <app-command-palette />
  <app-tour />

  <!-- Appearance settings panel -->
  <app-settings-panel
    [visible]="layout.settingsOpen()"
    (visibleChange)="onSettingsVisible($event)"
  />
</div>
