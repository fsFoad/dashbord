<div
  class="pack-sidebar flex h-full flex-col border-e border-surface-200 bg-surface-0 bg-gradient-to-b from-white/[0.04] to-black/10 transition-[width] duration-200 dark:border-surface-800 dark:bg-surface-900"
  [style.width]="slim() ? 'var(--sidebar-width-collapsed)' : 'var(--sidebar-width)'"
>
  <!-- Branding -->
  <a
    routerLink="/dashboard"
    class="flex h-[var(--topbar-height)] shrink-0 items-center gap-3 px-4"
  >
    <span class="grid size-9 shrink-0 place-items-center rounded-xl bg-primary font-bold text-primary-contrast shadow-lg shadow-black/20 ring-1 ring-white/10">
      {{ branding.appShortName }}
    </span>
    @if (!slim()) {
      <span class="truncate-1 text-lg font-semibold text-surface-900 dark:text-surface-0">
        {{ branding.appName }}
      </span>
    }
  </a>

  <!-- Profile block: avatar → profile, username, current Jalali date -->
  <app-sidebar-profile />

  <!-- Soft, edge-faded divider -->
  <div class="mx-4 h-px shrink-0 bg-gradient-to-r from-transparent via-white/15 to-transparent"></div>

  <!-- Menu (per-user: role-filtered + pinned + hidden) -->
  <nav data-tour="menu" class="thin-scroll flex-1 overflow-y-auto py-2">
    <ul class="space-y-0.5 px-2">
      @for (item of menuService.menu(); track item.id) {
        <app-menu-item [item]="item" [level]="0" />
      }
    </ul>
  </nav>

  <!-- Soft, edge-faded divider -->
  <div class="mx-4 h-px shrink-0 bg-gradient-to-r from-transparent via-white/15 to-transparent"></div>

  <!-- Footer: app version (menu customization now lives in the profile page) -->
  <div class="shrink-0 p-2">
    <!-- App version + release date -->
    <button
      type="button"
      (click)="whatsNew.show()"
      [pTooltip]="slim() ? 'v' + version : ('whatsnew.title' | transloco)"
      tooltipPosition="top"
      class="mt-0.5 flex w-full items-center justify-center gap-1.5 rounded-lg px-3 py-1.5 text-[11px] text-muted-color transition-colors hover:text-primary"
    >
      @if (slim()) {
        <i class="pi pi-tag text-[10px]"></i>
      } @else {
        <span dir="ltr" class="font-semibold">v{{ version }}</span>
        <span class="opacity-60">·</span>
        <span>{{ releaseDate | appDate }}</span>
      }
    </button>
  </div>
</div>
