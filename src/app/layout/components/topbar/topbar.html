<header
  class="flex h-[var(--topbar-height)] items-center gap-2 border-b border-surface-200 bg-surface-0/95 px-3 dark:border-surface-800 dark:bg-surface-900/95 sm:px-4"
>
  <!-- Sidebar toggle -->
  <button
    type="button"
    data-tour="menu-toggle"
    (click)="toggleSidebar()"
    [pTooltip]="'common.toggleMenu' | transloco"
    tooltipPosition="bottom"
    class="grid size-10 shrink-0 place-items-center rounded-lg text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
    aria-label="Toggle menu"
  >
    <i class="pi pi-bars text-lg"></i>
  </button>

  <!-- Breadcrumb (hidden on the smallest screens) -->
  <div class="hidden min-w-0 flex-1 sm:block">
    <app-breadcrumb />
  </div>
  <div class="flex-1 sm:hidden"></div>
</header>
