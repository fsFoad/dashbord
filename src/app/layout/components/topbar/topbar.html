<header
  class="flex h-[var(--topbar-height)] items-center gap-2 border-b border-surface-200 bg-surface-0/80 px-3 backdrop-blur dark:border-surface-800 dark:bg-surface-900/80 sm:px-4"
>
  <!-- Sidebar toggle -->
  <button
    type="button"
    (click)="toggleSidebar()"
    [pTooltip]="'common.toggleMenu' | transloco"
    tooltipPosition="bottom"
    class="grid size-10 shrink-0 place-items-center rounded-lg text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
    aria-label="Toggle menu"
  >
    <i class="pi pi-bars text-lg"></i>
  </button>

  <!-- Breadcrumb (hidden on the smallest screens) -->
  <div class="hidden min-w-0 flex-1 sm:block">
    <app-breadcrumb />
  </div>
  <div class="flex-1 sm:hidden"></div>

  <!-- Quick actions -->
  <div class="flex shrink-0 items-center gap-1">
    <!-- Language -->
    <button
      type="button"
      (click)="toggleLang()"
      [pTooltip]="'common.language' | transloco"
      tooltipPosition="bottom"
      class="h-10 min-w-10 rounded-lg px-2 text-sm font-semibold text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
    >
      {{ langLabel() }}
    </button>

    <!-- Dark / light -->
    <button
      type="button"
      (click)="toggleDark()"
      [pTooltip]="'common.theme' | transloco"
      tooltipPosition="bottom"
      class="grid size-10 place-items-center rounded-lg text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
      aria-label="Toggle dark mode"
    >
      <i class="pi text-lg" [class.pi-moon]="!isDark()" [class.pi-sun]="isDark()"></i>
    </button>

    <!-- Notifications (wired in a later phase) -->
    <button
      type="button"
      [pTooltip]="'common.notifications' | transloco"
      tooltipPosition="bottom"
      class="relative grid size-10 place-items-center rounded-lg text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
      aria-label="Notifications"
    >
      <i class="pi pi-bell text-lg"></i>
      <span class="absolute end-2 top-2 size-2 rounded-full bg-primary"></span>
    </button>

    <!-- Settings panel -->
    <button
      type="button"
      (click)="openSettings()"
      [pTooltip]="'common.settings' | transloco"
      tooltipPosition="bottom"
      class="grid size-10 place-items-center rounded-lg text-surface-600 hover:bg-surface-100 dark:text-surface-300 dark:hover:bg-surface-800"
      aria-label="Settings"
    >
      <i class="pi pi-sliders-h text-lg"></i>
    </button>

    <!-- Profile -->
    <button type="button" (click)="openProfile($event)" class="ms-1" aria-label="Profile">
      <p-avatar label="A" shape="circle" styleClass="bg-primary! text-primary-contrast!" />
    </button>
    <p-menu #profileMenu [model]="profileItems" [popup]="true" appendTo="body" />
  </div>
</header>
