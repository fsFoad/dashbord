<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />

  <!-- Web fonts available out-of-the-box (Persian + Latin). Others can be added via @font-face. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&family=Inter:wght@100..900&family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300..800&display=swap"
    rel="stylesheet" />

  <!-- Anti-FOUC: apply persisted settings before Angular boots -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('app.settings');
        var s = raw ? JSON.parse(raw) : {};
        var html = document.documentElement;
        var lang = s.language || 'fa';
        html.setAttribute('lang', lang);
        html.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
        if (s.darkMode) html.classList.add('app-dark');
        if (s.fontFamily) html.style.setProperty('--app-font', s.fontFamily);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root>
    <div style="display:grid;place-items:center;min-height:100dvh;font-family:system-ui">
      <div style="text-align:center;color:#888">
        <div style="font-size:14px">Loading&hellip;</div>
        <div style="font-size:11px;margin-top:6px">If this never disappears, open DevTools (F12) &rarr; Console</div>
      </div>
    </div>
  </app-root>
</body>
</html>
